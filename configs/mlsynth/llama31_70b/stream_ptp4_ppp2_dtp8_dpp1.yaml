# Architettura copiata 1:1 dal config.json ufficiale (GQA + SwiGLU, bf16).
model:
  name: "llama31_70b_stream_ptp4_ppp2_dtp8_dpp1"
  num_layers: 80
  hidden_size: 8192
  num_attention_heads: 64
  num_kv_heads: 8           # GQA (8 KV head -> tp <= 8 senza replica)
  head_dim: 128             # = 8192/64
  intermediate_size: 28672  # SwiGLU
  ffn_type: swiglu
  vocab_size: 128256
  bytes_per_val: 2          # bf16
  scale: 1.0

prefill_parallelism:
  tp_size: 4
  pp_size: 2

decode_parallelism:
  tp_size: 8
  pp_size: 1

inference:
  serialize_decode_iterations: true
  kv_transfer:
    mode: streaming         # bulk | streaming
    direction: push         # push | pull
    explicit_request: false

  requests:
    - { prompt_len: 10000, gen_len: 8 }
    - { prompt_len: 10000, gen_len: 8 }
    - { prompt_len: 10000, gen_len: 8 }
    - { prompt_len: 10000, gen_len: 8 }