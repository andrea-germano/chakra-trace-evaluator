model:
  name: "test"
  num_layers: 4
  vocab_size: 1024
  hidden_size: 128
  bytes_per_val: 2
  scale: 1.0

prefill_parallelism:
  tp_size: 1              # Nessun parallelismo tensoriale nel prefill
  pp_size: 2

decode_parallelism:
  tp_size: 2              # Decode diviso su 2 NPU (Resharding 1:2)
  pp_size: 2

inference:
  serialize_decode_iterations: true
  kv_transfer:
    mode: streaming   
    direction: pull       # Il decode richiede esplicitamente la KV cache
    explicit_request: true 
  requests:
    - { prompt_len: 10, gen_len: 3 }