# Architettura copiata 1:1 dal config.json ufficiale (GQA + SwiGLU, bf16).
model:
  name: "llama31_70b_p-tp2pp2_d-tp2pp2_stream_64reqs_512prompt"
  num_layers: 80
  hidden_size: 8192
  num_attention_heads: 64
  num_kv_heads: 8           # GQA (8 KV head -> tp <= 8 senza replica)
  head_dim: 128             # = 8192/64
  intermediate_size: 28672  # SwiGLU
  ffn_type: swiglu
  vocab_size: 128256
  bytes_per_val: 2          # bf16
  scale: 1.0

prefill_parallelism:
  tp_size: 2
  pp_size: 2

decode_parallelism:
  tp_size: 2
  pp_size: 2

inference:
  serialize_decode_iterations: true
  kv_transfer: streaming   # bulk | streaming
  
  num_requests: 64
  prompt_len: 512
  gen_len: 8